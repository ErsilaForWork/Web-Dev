<div class="page">
  @if (displayedProducts().length > 0) {
  <div class="products-grid">
    @for (product of displayedProducts(); track product.id) {
    <app-product-item
      [product]="product"
      (productDeleted)="onProductDeleted($event)"
    />
    }
  </div>
  } @else {
  <div class="empty-message">
    <p>Нет товаров в этой категории</p>
  </div>
  }
</div>
